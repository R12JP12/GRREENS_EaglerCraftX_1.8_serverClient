<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>EaglercraftX 1.8.8</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #000;
    }
    #gameCanvas {
      width: 100vw;
      height: 100vh;
      display: block;
    }
  </style>

  <script src="eaglercraft.js"></script>
</head>

<body>
  <canvas id="gameCanvas"></canvas>

  <script>
    // 🔥 THIS is where your Railway WSS URL goes
    const SERVER_URL = "wss://eaglercraftxserver.up.railway.app";

    window.addEventListener("load", () => {
      startEaglercraft({
        canvas: document.getElementById("gameCanvas"),
        server: SERVER_URL,
        assetsURI: "assets/",
        wasmURI: "eaglercraft.wasm"
      });
    });
  </script>
</body>
</html>
